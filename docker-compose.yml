# kvellman origin (Community) — production single-node deployment.
#
#   1. Copy .env.deploy.example to .env.deploy and fill in DOMAIN, NUXT_SESSION_PASSWORD,
#      POSTGRES_PASSWORD.
#   2. Point your DNS A/AAAA record for DOMAIN at this host; open ports 80 + 443.
#   3. docker compose --env-file .env.deploy up -d --build
#
# Caddy obtains a Let's Encrypt certificate automatically for DOMAIN, so winget (which requires
# HTTPS for non-localhost sources) can use https://DOMAIN/api/<token>.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: kvellman
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: kvellman
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kvellman']
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    # On the server, set KVELLMAN_IMAGE to your registry path (e.g. registry.example.com/kvellman:1.0)
    # and run `docker compose pull && docker compose up -d` (no --build). `build: .` is used only when
    # you build locally with `docker compose build` / `up --build`.
    image: ${KVELLMAN_IMAGE:-kvellman:latest}
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://kvellman:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/kvellman
      # Session cookie sealing secret (>=32 chars): openssl rand -hex 32
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:?set a 32+ char secret}
      # Public base URL clients see — used to resolve $REPO_URL and locally-hosted installer links.
      NUXT_REPO_URL: https://${DOMAIN:?set DOMAIN, e.g. repo.example.com}
      NUXT_INSTALLER_STORE: /data/installers
      NUXT_PKI_DIR: /data/pki
      # Optional toggles. Nitro only overrides runtimeConfig via the NUXT_ prefix at runtime, so the
      # friendly names from .env are mapped here. Defaults keep them off/unset.
      NUXT_TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      NUXT_TELEMETRY_RETENTION_DAYS: ${TELEMETRY_RETENTION_DAYS:-90}
      NUXT_CATALOG_SYNC_ENABLED: ${CATALOG_SYNC_ENABLED:-false}
      NUXT_CATALOG_SYNC_INTERVAL_HOURS: ${CATALOG_SYNC_INTERVAL_HOURS:-6}
      NUXT_GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      HOST: 0.0.0.0
      PORT: '3000'
    volumes:
      - installers:/data/installers
      - pki:/data/pki
    expose:
      - '3000'

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN, e.g. repo.example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  installers:
  pki:
  caddy_data:
  caddy_config:
